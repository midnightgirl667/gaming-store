<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Shopping Cart</title>

<link rel="stylesheet" href="style.css">

<style>

.cart-page{

padding:120px 30px 50px;

}

.cart-title{

font-size:50px;

margin-bottom:10px;

text-align:center;

}

.cart-subtitle{

text-align:center;

color:#aaa;

margin-bottom:40px;

}

.cart-container{

display:grid;

grid-template-columns:2fr 1fr;

gap:30px;

}

.cart-items{

background:#181818;

padding:30px;

border-radius:20px;

}

.cart-item{

display:flex;

align-items:center;

justify-content:space-between;

padding:20px 0;

border-bottom:1px solid #333;

}

.cart-item img{

width:100px;

height:100px;

object-fit:contain;

}

.item-info{

flex:1;

padding-left:20px;

}

.item-name{

font-size:22px;

margin-bottom:10px;

}

.item-price{

color:#00ff88;

font-size:20px;

}

.quantity{

display:flex;

align-items:center;

gap:10px;

}

.quantity button{

width:35px;

height:35px;

border:none;

background:#00ff88;

border-radius:8px;

font-size:18px;

cursor:pointer;

}

.summary{

background:#181818;

padding:25px;

border-radius:20px;

height:fit-content;

position:sticky;

top:120px;

}

.summary h2{

color:#00ff88;

margin-bottom:20px;

}

.summary p{

margin-bottom:15px;

}

.total{

font-size:35px;

color:#00ff88;

margin-top:20px;

}

.checkout-btn{

width:100%;

padding:15px;

margin-top:20px;

background:#00ff88;

border:none;

border-radius:10px;

font-size:18px;

font-weight:bold;

cursor:pointer;

}

@media(max-width:900px){

.cart-container{

grid-template-columns:1fr;

}

}

</style>

</head>

<body>

<nav>

<div class="logo">

<img src="images/logo.png">

<h1>Gaming Store</h1>

</div>

<ul>

<li><a href="index.html">Home</a></li>
<li><a href="products.html">Products</a></li>
<li><a href="builder.html">PC Builder</a></li>
<li><a href="cart.html">Cart</a></li>
<li><a href="contact.html">Contact</a></li>

</ul>

</nav>

<div class="cart-page">

<h1 class="cart-title">
Shopping Cart
</h1>

<p class="cart-subtitle">
Review your items before checkout
</p>

<div class="cart-container">

<div class="cart-items">

<div class="cart-item">

<img src="images/pc.png">

<div class="item-info">

<div class="item-name">
Gaming PC
</div>

<div class="item-price">
$2999
</div>

</div>

<div class="quantity">

<button>-</button>

<span>1</span>

<button>+</button>

</div>

</div>

<div class="cart-item">

<img src="images/headset.png">

<div class="item-info">

<div class="item-name">
Gaming Headset
</div>

<div class="item-price">
$99
</div>

</div>

<div class="quantity">

<button>-</button>

<span>1</span>

<button>+</button>

</div>

</div>

</div>

<div class="summary">

<h2>Order Summary</h2>

<p>Items: 2</p>

<p>Shipping: Free</p>

<div class="total">

$3098

</div>

<button
class="checkout-btn"
onclick="location.href='checkout.html'">

Proceed To Checkout

</button>

</div>

</div>

</div>

</body>
</html>
