}

.contact-container h1{

text-align:center;

margin-bottom:30px;

color:#00ff88;

font-size:50px;

}

.contact-container input,
.contact-container textarea{

width:100%;

padding:15px;

margin-bottom:15px;

border:none;

border-radius:10px;

background:#111;

color:white;

}

.contact-container textarea{

height:150px;

resize:none;

}

.contact-container button{

width:100%;

padding:15px;

background:#00ff88;

border:none;

border-radius:10px;

font-weight:bold;

cursor:pointer;

font-size:18px;

.info{
